<div class="card bg-base-100 shadow-xl m-5">
  <figure>
    <img [src]="course?.image" alt="placeholder" />
  </figure>
  <div class="card-body">
    <h2 class="card-title">{{ course?.title }}</h2>
    <span>Instructor: {{ course?.instructor }} </span>
    <span>Seats: {{ course?.seats }}</span>
  </div>
</div>
